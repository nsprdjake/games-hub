<style>
:root {
  --bg: #0f0a1a;
  --bg2: #1a1033;
  --purple: #8b5cf6;
  --purple-deep: #6d28d9;
  --pink: #ec4899;
  --cyan: #22d3ee;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #facc15;
  --ink: #f0e7ff;
  --ink-dim: rgba(240,231,255,0.5);
  --glass: rgba(139,92,246,0.12);
  --glass-border: rgba(139,92,246,0.25);
  --radius: 20px;
  --radius-sm: 12px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;min-height:100dvh;background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden}

body{
  background:
    radial-gradient(ellipse at 30% 0%,rgba(139,92,246,0.2),transparent 50%),
    radial-gradient(ellipse at 70% 100%,rgba(236,72,153,0.15),transparent 50%),
    var(--bg);
}

/* Canvas background */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4}

/* Layout */
.game-wrap{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}

/* Screens */
.screen{display:none;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:480px}
.screen.active{display:flex}

/* Start screen */
.logo{font-size:clamp(48px,12vw,72px);line-height:1;margin-bottom:8px}
h1{font-size:clamp(28px,6vw,40px);font-weight:800;margin:0 0 8px;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:16px;color:var(--ink-dim);margin:0 0 32px;line-height:1.4}
.how{font-size:14px;color:var(--ink-dim);margin:0 0 24px;line-height:1.6;max-width:340px}
.how strong{color:var(--ink)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:16px 40px;border:none;border-radius:60px;
  font-size:18px;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;
  box-shadow:0 8px 30px rgba(139,92,246,0.4);
  transition:transform 0.15s,box-shadow 0.15s;
  -webkit-user-select:none;user-select:none;
}
.btn:active{transform:scale(0.96);box-shadow:0 4px 16px rgba(139,92,246,0.3)}
.btn-sm{padding:12px 28px;font-size:15px}
.btn-outline{background:transparent;border:2px solid var(--glass-border);color:var(--ink);box-shadow:none}
.btn-outline:active{background:var(--glass)}

/* HUD */
.hud{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:480px;padding:12px 16px;
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;
}
.hud-round{color:var(--ink-dim)}
.hud-round span{color:var(--ink)}
.hud-score{color:var(--yellow);font-variant-numeric:tabular-nums}
.hud-timer{
  display:flex;align-items:center;gap:6px;
  font-variant-numeric:tabular-nums;
}
.timer-bar{width:60px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.timer-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.1s linear,background 0.3s}
.timer-fill.warn{background:var(--yellow)}
.timer-fill.danger{background:var(--red)}

/* Puzzle card */
.puzzle-card{
  width:100%;max-width:480px;
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);border-radius:var(--radius);
  padding:32px 24px 24px;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.category-badge{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--cyan);
  padding:4px 12px;border:1px solid rgba(34,211,238,0.3);border-radius:20px;
}
.emoji-display{
  font-size:clamp(40px,10vw,64px);
  line-height:1.3;
  letter-spacing:4px;
  padding:16px;
  min-height:100px;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  word-break:break-word;
}
.hint-text{font-size:13px;color:var(--ink-dim);margin:0;min-height:18px}

/* Answer options */
.options{
  display:grid;grid-template-columns:1fr;gap:10px;
  width:100%;max-width:480px;
}
.option-btn{
  padding:16px 20px;border:2px solid var(--glass-border);border-radius:var(--radius-sm);

.option-btn.correct{border-color:var(--green);background:rgba(74,222,128,0.15);color:var(--green)}
.option-btn.wrong{border-color:var(--red);background:rgba(248,113,113,0.1);color:var(--red)}
.option-btn.reveal{border-color:var(--green);background:rgba(74,222,128,0.08);opacity:0.7}
.option-btn.disabled{pointer-events:none;opacity:0.5}

.feedback{

.feedback.correct-fb{color:var(--green)}
.feedback.wrong-fb{color:var(--red)}
.feedback.timeout-fb{color:var(--yellow)}

.result-score{font-size:clamp(48px,10vw,72px);font-weight:800;margin:0;background:linear-gradient(135deg,var(--yellow),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-label{font-size:16px;color:var(--ink-dim);margin:4px 0 24px}
.result-msg{font-size:18px;font-weight:600;margin:0 0 24px;line-height:1.4}

.breakdown{

.bd-result{flex-shrink:0;font-size:16px}

/* Footer */
.footer{font-size:12px;color:var(--ink-dim);margin-top:16px}
.footer a{color:var(--purple);text-decoration:none}

/* Animations */
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.anim-slide{animation:slideUp 0.35s ease-out}
.anim-pop{animation:pop 0.4s ease-out}
.anim-shake{animation:shake 0.4s ease-out}

/* Responsive */
@media(min-width:500px){
  .options{grid-template-columns:1fr 1fr}
}
</style>

(function initBg(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H;
  const dots=[];
  const N=35;

  function resize(){
    W=c.width=window.innerWidth;
    H=c.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  for(let i=0;i<N;i++){
    dots.push({
      x:Math.random()*W,
      y:Math.random()*H,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4,
      r:Math.random()*2+1
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<N;i++){
      const d=dots[i];
      d.x+=d.vx;d.y+=d.vy;
      if(d.x<0||d.x>W)d.vx*=-1;
      if(d.y<0||d.y>H)d.vy*=-1;

      ctx.beginPath();
      ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle='rgba(139,92,246,0.5)';
      ctx.fill();

      for(let j=i+1;j<N;j++){
        const e=dots[j];
        const dx=d.x-e.x,dy=d.y-e.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<150){
          ctx.beginPath();
          ctx.moveTo(d.x,d.y);
          ctx.lineTo(e.x,e.y);
          ctx.strokeStyle=`rgba(139,92,246,${0.15*(1-dist/150)})`;
          ctx.lineWidth=0.8;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ──────────────────────────────────────────
// GAME LOGIC
// ──────────────────────────────────────────
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}

function pickPuzzles(){
  // Pick ROUNDS puzzles, trying to mix categories
  const shuffled=shuffle(PUZZLES);
  const picked=[];
  const catCount={};
  for(const p of shuffled){
    if(picked.length>=ROUNDS)break;
    const cc=catCount[p.cat]||0;
    if(cc<3){
      picked.push(p);
      catCount[p.cat]=(cc||0)+1;
    }
  }
  // Fill if needed
  while(picked.length<ROUNDS){
    const remaining=shuffled.filter(p=>!picked.includes(p));
    if(remaining.length===0)break;
    picked.push(remaining[0]);
  }
  return picked;
}

function showScreen(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  screen.classList.add('active');
}

function startGame(){
  currentRound=0;
  score=0;
  roundData=[];
  selectedPuzzles=pickPuzzles();
  hudScore.textContent='0 pts';
  showScreen(playScreen);
  // Mark this game as played for hub feedback
  try{sessionStorage.setItem('nsprd_last_played','emoji-decoder');sessionStorage.setItem('nsprd_play_ts',Date.now())}catch(e){}
  nextRound();
}

function nextRound(){
  if(currentRound>=ROUNDS){
    endGame();
    return;
  }
  answered=false;
  feedback.textContent='';
  feedback.className='feedback';
  const puzzle=selectedPuzzles[currentRound];
  roundNum.textContent=currentRound+1;
  categoryBadge.textContent=puzzle.cat;
  emojiDisplay.textContent=puzzle.emoji;
  hintText.textContent='';

  // Shuffle options
  const opts=shuffle(puzzle.opts);
  optionsDiv.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.textContent=opt;
    btn.addEventListener('click',()=>handleAnswer(opt,puzzle,btn));
    optionsDiv.appendChild(btn);
  });

  // Animate card
  puzzleCard.classList.remove('anim-slide');
  void puzzleCard.offsetWidth;
  puzzleCard.classList.add('anim-slide');

  // Start timer
  timeLeft=TIME_LIMIT;
  roundStartTime=performance.now();
  updateTimerDisplay();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const elapsed=(performance.now()-roundStartTime)/1000;
    timeLeft=Math.max(0,TIME_LIMIT-elapsed);
    updateTimerDisplay();
    if(timeLeft<=0){
      clearInterval(timerInterval);
      handleTimeout(puzzle);
    }
  },50);
}

function updateTimerDisplay(){
  const pct=(timeLeft/TIME_LIMIT)*100;
  timerFill.style.width=pct+'%';
  timerText.textContent=Math.ceil(timeLeft)+'s';
  timerFill.className='timer-fill';
  if(pct<25)timerFill.classList.add('danger');
  else if(pct<50)timerFill.classList.add('warn');
}

function handleAnswer(chosen,puzzle,btn){
  if(answered)return;
  answered=true;
  clearInterval(timerInterval);

  const elapsed=(performance.now()-roundStartTime)/1000;
  const correct=chosen===puzzle.answer;

  // Calculate points — faster = more points
  let pts=0;
  if(correct){
    const speedBonus=Math.max(0,(TIME_LIMIT-elapsed)/TIME_LIMIT);
    pts=Math.round(MAX_POINTS*0.5 + MAX_POINTS*0.5*speedBonus);
    score+=pts;
  }

  // Show feedback
  if(correct){
    btn.classList.add('correct');
    feedback.className='feedback correct-fb';
    feedback.textContent=`+${pts} pts`;
  } else {
    btn.classList.add('wrong');
    feedback.className='feedback wrong-fb anim-shake';
    feedback.textContent='Nope!';
    // Reveal correct answer
    optionsDiv.querySelectorAll('.option-btn').forEach(b=>{
      if(b.textContent===puzzle.answer)b.classList.add('reveal');
      else if(!b.classList.contains('wrong'))b.classList.add('disabled');
    });
  }

  // Disable all options
  optionsDiv.querySelectorAll('.option-btn').forEach(b=>{
    if(!b.classList.contains('correct')&&!b.classList.contains('wrong')&&!b.classList.contains('reveal'))
      b.classList.add('disabled');
  });

  hudScore.textContent=score+' pts';

  roundData.push({puzzle,chosen,correct,time:elapsed.toFixed(1),pts});
  currentRound++;

  setTimeout(nextRound,correct?1200:2000);
}

function handleTimeout(puzzle){
  if(answered)return;
  answered=true;

  feedback.className='feedback timeout-fb';
  feedback.textContent='Time\'s up!';

  optionsDiv.querySelectorAll('.option-btn').forEach(b=>{
    if(b.textContent===puzzle.answer)b.classList.add('reveal');
    else b.classList.add('disabled');
  });

  roundData.push({puzzle,chosen:null,correct:false,time:TIME_LIMIT.toFixed(1),pts:0});
  currentRound++;

  setTimeout(nextRound,2000);
}

function endGame(){
  clearInterval(timerInterval);
  showScreen(resultsScreen);

  const correctCount=roundData.filter(r=>r.correct).length;
  resultScore.textContent=score;

  // Result emoji and message
  const pct=correctCount/ROUNDS;
  if(pct>=0.9){
    resultEmoji.textContent='🧠';
    resultMsg.textContent='Emoji Savant. You speak fluent emoji.';
  } else if(pct>=0.7){
    resultEmoji.textContent='🔥';
    resultMsg.textContent='Solid decoding. You\'ve got the gift.';
  } else if(pct>=0.5){
    resultEmoji.textContent='🤔';
    resultMsg.textContent='Not bad. A few more rounds and you\'ll crack it.';
  } else if(pct>=0.3){
    resultEmoji.textContent='😅';
    resultMsg.textContent='Rough day at the emoji office. Try again?';
  } else {
    resultEmoji.textContent='💀';
    resultMsg.textContent='The emojis defeated you. Rematch?';
  }

  // Build breakdown
  breakdown.innerHTML='';
  roundData.forEach((r,i)=>{
    const row=document.createElement('div');
    row.className='bd-row';
    row.innerHTML=`
      <span class="bd-num">${i+1}</span>
      <span class="bd-emoji">${r.puzzle.emoji.slice(0,4)}</span>
      <span class="bd-answer">${r.puzzle.answer}</span>
      <span class="bd-time">${r.time}s</span>
      <span class="bd-result">${r.correct?'✅':'❌'}</span>
    `;
    breakdown.appendChild(row);
  });
}

// ──────────────────────────────────────────
// SHARE
// ──────────────────────────────────────────
function getShareText(){
  const correctCount=roundData.filter(r=>r.correct).length;
  const grid=roundData.map(r=>r.correct?'🟩':'🟥').join('');
  return `🧩 Emoji Decoder\n${score} pts (${correctCount}/${ROUNDS})\n${grid}\n\nPlay at games.nsprd.com/emoji-decoder`;
}

shareBtn.addEventListener('click',async()=>{
  const text=getShareText();
  if(navigator.share){
    try{await navigator.share({text});return}catch(e){}
  }
  try{
    await navigator.clipboard.writeText(text);
    shareBtn.textContent='Copied!';
    setTimeout(()=>shareBtn.textContent='Share Score',2000);
  }catch(e){
    // Fallback: select a temp textarea
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    shareBtn.textContent='Copied!';
    setTimeout(()=>shareBtn.textContent='Share Score',2000);
  }
});

// ──────────────────────────────────────────
// EVENT LISTENERS
// ──────────────────────────────────────────
startBtn.addEventListener('click',startGame);
replayBtn.addEventListener('click',startGame);

// Keyboard shortcuts (desktop)
document.addEventListener('keydown',e=>{
  if(playScreen.classList.contains('active')&&!answered){
    const idx='1234'.indexOf(e.key);
    if(idx>=0){
      const btns=optionsDiv.querySelectorAll('.option-btn');
      if(btns[idx])btns[idx].click();
    }
  }
  if(e.key==='Enter'){
    if(startScreen.classList.contains('active'))startBtn.click();
    if(resultsScreen.classList.contains('active'))replayBtn.click();
  }
});
</script>
