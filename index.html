<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>games.nsprd.com — Daily-ish mini-games to ruin your group chat</title>
<meta name="description" content="A new sharable mini-game every day. Single-player, mobile-first, instantly playable." />
<meta name="theme-color" content="#1a0633" />

<meta property="og:type" content="website" />
<meta property="og:title" content="games.nsprd.com" />
<meta property="og:description" content="A new sharable mini-game every day. Made for your group chat." />
<meta property="og:url" content="https://games.nsprd.com" />
<meta property="og:image" content="https://games.nsprd.com/og.png" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎮%3C/text%3E%3C/svg%3E" />

<style>
  :root{
    --bg-1:#0a0118;
    --bg-2:#1a0633;
    --bg-3:#2d0850;
    --pink:#ff6ad5;
    --peach:#ffb86b;
    --lime:#a8ff60;
    --sky:#5ee0ff;
    --gold:#ffd166;
    --ink:#fff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{
    background:
      radial-gradient(900px 600px at 10% 0%, rgba(255,106,213,.35), transparent 60%),
      radial-gradient(900px 600px at 90% 80%, rgba(94,224,255,.25), transparent 60%),
      linear-gradient(160deg,var(--bg-1),var(--bg-2) 60%, var(--bg-3));
    min-height:100vh;min-height:100dvh;
    overflow-x:hidden;
    padding: max(env(safe-area-inset-top),24px) 16px max(env(safe-area-inset-bottom),32px);
  }

  .wrap{max-width:1040px;margin:0 auto;}
  header.top{
    display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:32px;
  }
  .brand{
    font-weight:900;font-size:18px;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;
  }
  .brand-dot{
    width:14px;height:14px;border-radius:50%;
    background:conic-gradient(from 0deg, var(--pink), var(--peach), var(--gold), var(--lime), var(--sky), var(--pink));
    box-shadow:0 0 14px rgba(255,106,213,.6);
  }
  .tag-link{color:#fff;opacity:.7;text-decoration:none;font-size:13px;}
  .tag-link:hover{opacity:1;}

  .hero{
    text-align:left;margin-bottom:34px;
  }
  .kicker{
    display:inline-block;text-transform:uppercase;letter-spacing:.18em;font-size:11px;
    padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);margin-bottom:14px;color:var(--gold);font-weight:800;
  }
  h1{
    font-size:clamp(40px,9vw,76px);line-height:.95;margin:0 0 12px;
    font-weight:900;letter-spacing:-2px;
    background: linear-gradient(90deg,var(--pink),var(--peach),var(--gold),var(--sky));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .lede{font-size:clamp(15px,2.6vw,18px);opacity:.85;max-width:580px;line-height:1.5;margin:0;}

  /* Featured */
  .featured{
    margin: 28px 0 44px;
    border-radius:28px;overflow:hidden;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
    box-shadow:0 20px 60px rgba(0,0,0,.45);
    display:grid;grid-template-columns: 1fr;
    position:relative;
  }
  .featured::before{
    content:"";position:absolute;inset:-2px;border-radius:28px;z-index:-1;
    background:conic-gradient(from 0deg, var(--pink), var(--peach), var(--gold), var(--lime), var(--sky), var(--pink));
    filter:blur(40px);opacity:.4;
    animation: spin 18s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (min-width: 760px){
    .featured{grid-template-columns: 1.1fr 1fr;}
  }
  .featured .art{
    aspect-ratio: 1200/630;
    background:#222 center/cover no-repeat;
    border-bottom:1px solid rgba(255,255,255,.1);
    position:relative;
  }
  @media (min-width: 760px){
    .featured .art{border-bottom:0;border-right:1px solid rgba(255,255,255,.1);height:100%;aspect-ratio:auto;}
  }
  .featured .meta{
    padding:24px;display:flex;flex-direction:column;justify-content:center;gap:12px;
  }
  .badge-of-the-day{
    display:inline-flex;align-items:center;gap:6px;
    text-transform:uppercase;letter-spacing:.2em;font-size:11px;font-weight:800;
    color:#1a0633;background:linear-gradient(90deg,var(--pink),var(--gold));
    padding:6px 10px;border-radius:999px;align-self:flex-start;
  }
  .featured h2{
    font-size:clamp(30px,5vw,46px);line-height:1;margin:0;font-weight:900;letter-spacing:-1px;
  }
  .featured p.tag{font-size:16px;opacity:.85;margin:0;line-height:1.4;}
  .featured .play-cta{
    appearance:none;border:0;cursor:pointer;font-family:inherit;text-decoration:none;text-align:center;
    font-size:17px;font-weight:900;color:#1a0633;
    background: linear-gradient(90deg, var(--pink), var(--peach), var(--gold));
    padding:14px 22px;border-radius:999px;align-self:flex-start;
    box-shadow:0 10px 28px rgba(255,106,213,.45);
    transition:transform .12s ease;
  }
  .featured .play-cta:active{transform:scale(.98);}

  /* All Games grid */
  .section-title{
    display:flex;align-items:baseline;justify-content:space-between;margin: 8px 0 16px;
  }
  .section-title h3{font-size:22px;margin:0;font-weight:900;letter-spacing:-.5px;}
  .section-title .count{font-size:12px;opacity:.6;text-transform:uppercase;letter-spacing:.18em;}

  .grid{
    display:grid;gap:16px;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }

  .tile{
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
    border-radius:20px;overflow:hidden;
    display:flex;flex-direction:column;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
    text-decoration:none;color:inherit;
  }
  .tile:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08);}
  .tile .art{
    aspect-ratio:1200/630;background:#111 center/cover no-repeat;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .tile .body{padding:14px 16px 18px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .tile .name{font-weight:900;font-size:18px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;}
  .tile .name .ico{font-size:18px;}
  .tile .one{font-size:14px;opacity:.8;line-height:1.4;margin:0;}
  .tile .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;padding-top:8px;}
  .tile .tags span{font-size:11px;opacity:.75;background:rgba(255,255,255,.08);padding:4px 8px;border-radius:999px;}

  .empty{
    text-align:center;opacity:.6;padding:28px;border:1px dashed rgba(255,255,255,.15);border-radius:18px;
  }

  footer{
    margin-top:48px;text-align:center;font-size:12px;opacity:.55;
  }
  footer a{color:inherit;}
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="brand"><span class="brand-dot"></span> games.nsprd.com</div>
    <a class="tag-link" href="https://nsprd.com" target="_blank" rel="noopener">by Inspired Design ↗</a>
  </header>

  <section class="hero">
    <span class="kicker">🎮 New game every day</span>
    <h1>Tiny games.<br/>Big group&nbsp;chats.</h1>
    <p class="lede">Single-player mini-games designed to be played in under 5 minutes and shared in under 5 seconds. No signup. No ads. Just vibes.</p>
  </section>

  <section id="featured-slot"></section>

  <div class="section-title">
    <h3>All games</h3>
    <span class="count" id="count"></span>
  </div>
  <div class="grid" id="grid"></div>

  <footer>
    <p>Made with ✨ + caffeine. <a href="https://nsprd.com">nsprd.com</a></p>
  </footer>
</div>

<script>
async function load(){
  const res = await fetch('/games.json', {cache:'no-store'});
  const data = await res.json();

  const games = data.games || [];
  const featuredSlug = data.featured;
  const featured = games.find(g => g.slug === featuredSlug) || games[0];
  const rest = games.filter(g => g !== featured);

  const $f = document.getElementById('featured-slot');
  if (featured){
    $f.innerHTML = `
      <div class="featured">
        <a class="art" href="${featured.url}" aria-label="Play ${featured.name}" style="background-image:url('${featured.image}')"></a>
        <div class="meta">
          <span class="badge-of-the-day">⭐️ Game of the Day</span>
          <h2>${escapeHtml(featured.name)} ${featured.emoji||''}</h2>
          <p class="tag">${escapeHtml(featured.tagline)}</p>
          <a class="play-cta" href="${featured.url}">Play now →</a>
        </div>
      </div>
    `;
  }

  const $grid = document.getElementById('grid');
  const $count = document.getElementById('count');
  $count.textContent = `${games.length} game${games.length===1?'':'s'}`;

  if (rest.length === 0){
    $grid.innerHTML = `<div class="empty">More games dropping nightly. Bookmark this page. 🌙</div>`;
  } else {
    $grid.innerHTML = rest.map(g => `
      <a class="tile" href="${g.url}">
        <div class="art" style="background-image:url('${g.image}')"></div>
        <div class="body">
          <div class="name"><span class="ico">${g.emoji||'🎮'}</span> ${escapeHtml(g.name)}</div>
          <p class="one">${escapeHtml(g.tagline)}</p>
          <div class="tags">
            ${(g.tags||[]).map(t=>`<span>#${escapeHtml(t)}</span>`).join('')}
          </div>
        </div>
      </a>
    `).join('');
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

load().catch(err => {
  document.getElementById('grid').innerHTML = `<div class="empty">Couldn't load games. (${err.message})</div>`;
});
</script>
</body>
</html>
